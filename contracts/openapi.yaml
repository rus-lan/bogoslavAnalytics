        FindMRsInput:
            type: object
            properties:
                user:
                    type: string
                    description: GitLab username or numeric user id
                from:
                    type: string
                    description: start of the date range, inclusive, YYYY-MM-DD
                to:
                    type: string
                    description: end of the date range, inclusive, YYYY-MM-DD
                more_than:
                    type: integer
                    description: return only merge requests where user left STRICTLY more than this many comments in [from, to]; a merge request with exactly this many comments is NOT returned, only one with more_than + 1 or more
                group:
                    type: string
                    description: restrict the search to this group's projects, including subgroups (numeric id or path)
                project:
                    type: string
                    description: restrict the search to this single project (numeric id or path); required together with mr
                mr:
                    type: integer
                    description: 'point mode: return exactly this merge request iid, with no candidate search of any kind (no events, no bruteforce, no autoselector); requires project; 0 or omitted means no point mode'
                strict:
                    type: boolean
                    description: force the bruteforce search strategy, skipping the events strategy and its smoke test
                artifacts_dir:
                    type: string
                    description: directory the mr_list artifact is written under, and where a matching artifact is looked up as a cache before calling GitLab (default "artifacts")
                format:
                    type: string
                    description: 'artifact wire format: json, yaml, text, or html (default yaml). Artifacts double as the cache: json and yaml round-trip and are looked up before calling GitLab. text and html are write-only -- neither is readable back, neither can ever be chained via from_artifact into a later tool, and neither is ever a cache hit'
                refresh:
                    type: boolean
                    description: bypass the cache and always call GitLab, even if a fresh cached mr_list artifact already exists
                cache_ttl_seconds:
                    type: integer
                    description: how long, in seconds, a cached mr_list artifact stays fresh before this tool calls GitLab again (default 86400, 24h)
            required:
                - user
                - from
                - to
                - more_than
            additionalProperties: false
